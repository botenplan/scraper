name: MPET Bot Scraper

on:
  schedule:
    - cron: '*/30 * * * *' # Draait elke 30 minuten
  workflow_dispatch: # Zodat je hem handmatig kunt starten

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nodig voor een goede rebase

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Tools installeren
        run: pip install requests beautifulsoup4

      - name: Bot draaien
        run: python scraper.py

      - name: Resultaat opslaan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mpet_planning.json
          git pull --rebase origin main
          git commit -m "Planning bijgewerkt door bot op $(date)" || exit 0
          git push origin main
